<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 .icon { font-size: 20px; }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    .label { font-size: 13px; color: #aaa; }
    /* Toggle switch */
    .switch {
      position: relative;
      width: 42px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 24px;
      transition: 0.3s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    .switch input:checked + .slider { background: #2196f3; }
    .switch input:checked + .slider::before { transform: translateX(18px); }
    /* Size controls */
    .size-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .size-btn {
      width: 28px; height: 28px;
      border: 1px solid #555;
      border-radius: 6px;
      background: #2a2a4a;
      color: #ccc;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .size-btn:hover { background: #3a3a6a; color: #fff; }
    .size-label {
      font-size: 13px;
      font-weight: 600;
      color: #64b5f6;
      min-width: 24px;
      text-align: center;
    }
    /* Status */
    #status {
      margin-top: 10px;
      font-size: 11px;
      color: #888;
      border-top: 1px solid #333;
      padding-top: 8px;
    }
    #status .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    #status .dot.on  { background: #4caf50; }
    #status .dot.off { background: #f44336; }
    a { color: #64b5f6; text-decoration: none; font-size: 11px; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1><span class="icon">🤟</span> ASL Overlay</h1>

  <div class="row">
    <span class="label">Enable overlay</span>
    <label class="switch">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <span class="label">Overlay size</span>
    <div class="size-controls">
      <button class="size-btn" id="size-down" title="Smaller">−</button>
      <span class="size-label" id="size-label">M</span>
      <button class="size-btn" id="size-up" title="Larger">+</button>
    </div>
  </div>

  <div class="row">
    <span class="label">Show gloss text</span>
    <label class="switch">
      <input type="checkbox" id="gloss-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div id="status">
    <span class="dot off" id="dot"></span>
    <span id="status-text">Checking…</span>
  </div>

  <div style="margin-top: 10px; text-align: center;">
    <a href="http://127.0.0.1:8794/docs" target="_blank">API server docs</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
